services:
  postgres:
    image: postgres:16-alpine
    container_name: simba-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: simba
      POSTGRES_PASSWORD: simba
      POSTGRES_DB: simba
    volumes:
      - simba_pg_data:/var/lib/postgresql/data

volumes:
  simba_pg_data:
